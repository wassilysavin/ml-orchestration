[pytest]
testpaths = tests
markers =
    data_quality: pre-training data quality tests (Task 1)
    robustness: post-training model robustness tests (Task 2)
    monitoring: post-deployment drift monitoring tests (Task 3)
    flow_versioning: versioned-flow configuration tests (Task 3)
    selection: offline best-config selection tests (Task 2)
    abtest: offline A/B split/routing tests (Task 3)
    experiments: multiple-simultaneous-experiment namespacing tests (Task 3)
    adaptation: closed-loop drift adaptation policy/promotion tests (Task 3)
